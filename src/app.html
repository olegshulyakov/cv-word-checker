<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			try {
				const localTheme = localStorage.getItem('cvwc_theme');
				const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches
					? 'dark'
					: 'light';
				const theme = localTheme === 'dark' || localTheme === 'light' ? localTheme : systemTheme;
				if (theme === 'dark') {
					document.documentElement.setAttribute('data-theme', 'dark');
				} else {
					document.documentElement.removeAttribute('data-theme');
				}
			} catch (_) {}
		</script>
		%sveltekit.head%
		<link
			rel="manifest"
			crossorigin="use-credentials"
			href="%sveltekit.assets%/manifest.webmanifest"
		/>
		<meta name="theme-color" content="#fbfbfa" />

		<!-- SEO Meta Tags -->
		<title>CV Word Checker - Optimize your CV</title>
		<meta
			name="description"
			content="Paste your CV and the target job description below to identify missing keywords and areas for improvement."
		/>
		<meta
			name="keywords"
			content="cv, resume, checker, ats, optimize, keywords, job description, skills match, resume scanner"
		/>
		<meta name="author" content="Oleg Shulyakov" />
		<meta name="robots" content="index, follow" />
		<meta property="og:title" content="CV Word Checker - Optimize your CV" />
		<meta
			property="og:description"
			content="Paste your CV and the target job description below to identify missing keywords and areas for improvement."
		/>
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://cv-word-checker.vercel.app/" />
		<meta property="og:image" content="https://cv-word-checker.vercel.app/og-image.png" />
		<meta property="og:site_name" content="CV Word Checker" />
		<meta property="og:locale" content="en_US" />

		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="CV Word Checker - Optimize your CV" />
		<meta
			name="twitter:description"
			content="Paste your CV and the target job description below to identify missing keywords and areas for improvement."
		/>
		<meta name="twitter:image" content="https://cv-word-checker.vercel.app/og-image.png" />

		<!-- Structured Data -->
		<script type="application/ld+json">
			{
				"@context": "https://schema.org",
				"@type": "WebApplication",
				"name": "CV Word Checker",
				"url": "https://cv-word-checker.com/",
				"description": "Paste your CV and the target job description below to identify missing keywords and areas for improvement.",
				"applicationCategory": "Utility",
				"operatingSystem": "Any"
			}
		</script>
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
